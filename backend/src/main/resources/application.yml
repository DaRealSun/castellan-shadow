spring:
  application:
    name: castellan-shadow-backend
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

castellan:
  etl:
    enabled: true
    holdings-cron: "0 30 18 * * MON-FRI"   # 6:30pm ET on weekdays
    prices-cron:   "0 0  19 * * MON-FRI"   # 7:00pm ET on weekdays
  data-sources:
    # Fund page that embeds the daily holdings table. {ticker} is lowercased.
    # Required by SEC Rule 6c-11; we scrape the HTML table at this URL.
    holdings-url-template: "https://castellanetf.com/{ticker}"
    yahoo-finance-base-url: "https://query1.finance.yahoo.com"
